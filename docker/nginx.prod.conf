# ── api.stopmap.kz → backend ──────────────────────────────────────────────────
server {
    listen 80;
    server_name api.stopmap.kz;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name api.stopmap.kz;

    ssl_certificate     /etc/letsencrypt/live/api.stopmap.kz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.stopmap.kz/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    client_max_body_size 20M;

    location / {
        proxy_pass         http://backend:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}

# ── portal.stopmap.kz → frontend ──────────────────────────────────────────────
server {
    listen 80;
    server_name portal.stopmap.kz;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name portal.stopmap.kz;

    ssl_certificate     /etc/letsencrypt/live/portal.stopmap.kz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/portal.stopmap.kz/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    location / {
        proxy_pass        http://frontend:3000;
        proxy_set_header  Host             $host;
        proxy_set_header  X-Real-IP        $remote_addr;
        proxy_http_version 1.1;
        proxy_set_header  Upgrade          $http_upgrade;
        proxy_set_header  Connection       "upgrade";
    }
}
