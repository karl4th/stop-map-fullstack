services:
  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  redis:
    image: redis:7-alpine
    restart: always
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  minio:
    image: minio/minio:latest
    restart: always
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  backend:
    image: ${BACKEND_IMAGE:-ghcr.io/karl4th/stopmap-backend:latest}
    restart: always
    env_file:
      - ../.env
    environment:
      POSTGRES_HOST: postgres
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: minio:9000
      MINIO_PUBLIC_ENDPOINT: ${MINIO_PUBLIC_ENDPOINT}
      APP_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - internal
    deploy:
      resources:
        limits:
          memory: 512M

  frontend:
    image: ${FRONTEND_IMAGE:-ghcr.io/karl4th/stopmap-frontend:latest}
    restart: always
    depends_on:
      - backend
    networks:
      - internal
    deploy:
      resources:
        limits:
          memory: 256M

  telegram:
    image: ${TELEGRAM_IMAGE:-ghcr.io/karl4th/stopmap-telegram:latest}
    restart: always
    env_file:
      - ../.env
    environment:
      REDIS_URL: redis://redis:6379/0
      BACKEND_URL: http://backend:8000/api
    depends_on:
      redis:
        condition: service_healthy
      backend:
        condition: service_started
    networks:
      - internal
    deploy:
      resources:
        limits:
          memory: 128M

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx.prod.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend
    networks:
      - internal
    deploy:
      resources:
        limits:
          memory: 64M

volumes:
  postgres_data:
  redis_data:
  minio_data:

networks:
  internal:
    driver: bridge
